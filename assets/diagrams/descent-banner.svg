<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" role="img" aria-labelledby="bt bd" preserveAspectRatio="xMidYMid meet">
  <title id="bt">COMP 2450: Data Structures and Algorithms — The Descent</title>
  <desc id="bd">A stone archway lit by a single torch on the left opens onto a dark staircase descending toward distant glowing eyes. A skeleton hangs in chains from the right column. Cobwebs fill the corners, spiders scuttle on silk threads, and cryptic runes are etched into the stones. "The Descent" is carved into the base in blackletter.</desc>

  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&amp;family=UnifrakturMaguntia&amp;display=swap');
    </style>

    <linearGradient id="stoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="45%" stop-color="#241616"/>
      <stop offset="100%" stop-color="#0a0504"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#5a3a2a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a0e0e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crossbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a20"/>
      <stop offset="55%" stop-color="#2e1e16"/>
      <stop offset="100%" stop-color="#241812"/>
    </linearGradient>
    <linearGradient id="column" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e120c"/>
      <stop offset="45%" stop-color="#3a2a20"/>
      <stop offset="100%" stop-color="#18100a"/>
    </linearGradient>
    <linearGradient id="archInterior" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120a06"/>
      <stop offset="55%" stop-color="#050302"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="torchGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9d77a" stop-opacity="0.75"/>
      <stop offset="35%" stop-color="#d97706" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flame" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#fff2c8"/>
      <stop offset="40%" stop-color="#f9d77a"/>
      <stop offset="75%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#8b4500"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a2a"/>
      <stop offset="55%" stop-color="#8b0000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="archClip">
      <path d="M 290 320 L 290 130 A 140 50 0 0 1 570 130 L 570 320 Z"/>
    </clipPath>

    <!-- reusable spider: body + 8 bent legs, origin centered -->
    <g id="spider">
      <g stroke="#080403" stroke-width="0.55" fill="none" stroke-linecap="round">
        <path d="M -2 -0.8 Q -4 -2.6 -5.6 -4.6"/>
        <path d="M -2 -0.2 Q -5 -2   -6.6 -2.8"/>
        <path d="M -2  0.2 Q -5  2   -6.6  2.8"/>
        <path d="M -2  0.8 Q -4  2.6 -5.6  4.6"/>
        <path d="M  1 -0.8 Q  3 -2.6  5.2 -4.6"/>
        <path d="M  1 -0.2 Q  4 -2    6.2 -2.8"/>
        <path d="M  1  0.2 Q  4  2    6.2  2.8"/>
        <path d="M  1  0.8 Q  3  2.6  5.2  4.6"/>
      </g>
      <ellipse cx="0.2" cy="0" rx="2.4" ry="1.9" fill="#080403"/>
      <circle  cx="-2.5" cy="0" r="1.4" fill="#080403"/>
    </g>

    <!-- reusable corner cobweb: origin at the corner, radiates down-right -->
    <g id="cobweb">
      <g stroke="#d4b98c" stroke-width="0.5" fill="none" opacity="0.45" stroke-linecap="round">
        <line x1="0" y1="0" x2="44" y2="4"/>
        <line x1="0" y1="0" x2="38" y2="18"/>
        <line x1="0" y1="0" x2="28" y2="28"/>
        <line x1="0" y1="0" x2="18" y2="38"/>
        <line x1="0" y1="0" x2="4"  y2="44"/>
      </g>
      <g stroke="#d4b98c" stroke-width="0.35" fill="none" opacity="0.4">
        <polyline points="16,1 15,6 12,11 7,15 1,16"/>
        <polyline points="30,3 27,13 21,21 13,27 3,30"/>
      </g>
    </g>

    <!-- smaller, dimmer cobweb for inside the arch -->
    <g id="cobweb-small">
      <g stroke="#9a8560" stroke-width="0.42" fill="none" opacity="0.55" stroke-linecap="round">
        <line x1="0" y1="0" x2="30" y2="4"/>
        <line x1="0" y1="0" x2="25" y2="14"/>
        <line x1="0" y1="0" x2="16" y2="22"/>
        <line x1="0" y1="0" x2="4"  y2="28"/>
      </g>
      <g stroke="#9a8560" stroke-width="0.3" fill="none" opacity="0.42">
        <polyline points="20,3 17,10 12,16 3,20"/>
      </g>
    </g>
  </defs>

  <!-- === base stone wall === -->
  <rect width="860" height="400" fill="url(#stoneBg)"/>
  <rect width="860" height="400" fill="url(#topGlow)"/>

  <!-- === inside the archway: dark interior + descending stairs + eyes + web + spider === -->
  <g clip-path="url(#archClip)">
    <rect x="290" y="80" width="280" height="240" fill="url(#archInterior)"/>

    <polygon points="290,320 570,320 525,292 335,292" fill="#3f2816"/>
    <line x1="335" y1="292" x2="525" y2="292" stroke="#20140a" stroke-width="1"/>
    <polygon points="335,292 525,292 490,270 370,270" fill="#2e1c10"/>
    <line x1="370" y1="270" x2="490" y2="270" stroke="#16100a" stroke-width="1"/>
    <polygon points="370,270 490,270 465,252 395,252" fill="#1f1309"/>
    <line x1="395" y1="252" x2="465" y2="252" stroke="#0e0804" stroke-width="1"/>
    <polygon points="395,252 465,252 448,238 412,238" fill="#140c06"/>
    <line x1="412" y1="238" x2="448" y2="238" stroke="#080502" stroke-width="0.8"/>
    <polygon points="412,238 448,238 438,228 422,228" fill="#0a0503"/>

    <circle cx="420" cy="232" r="11" fill="url(#eyeGlow)"/>
    <circle cx="440" cy="232" r="11" fill="url(#eyeGlow)"/>
    <circle cx="420" cy="232" r="1.6" fill="#ffd28a"/>
    <circle cx="440" cy="232" r="1.6" fill="#ffd28a"/>

    <!-- small cobwebs tucked into the arch's upper corners -->
    <use href="#cobweb-small" transform="translate(294, 134)"/>
    <use href="#cobweb-small" transform="translate(566, 134) scale(-1, 1)"/>

    <!-- spider descending from the arch on a silk thread -->
    <line x1="430" y1="82" x2="430" y2="118" stroke="#d4b98c" stroke-width="0.4" opacity="0.55"/>
    <g transform="translate(430, 122)"><use href="#spider"/></g>
  </g>

  <!-- === stone columns === -->
  <g>
    <!-- Left column -->
    <rect x="0" y="0" width="120" height="400" fill="url(#column)"/>
    <rect x="-2" y="122" width="132" height="5"  fill="#8b5a00" opacity="0.55"/>
    <rect x="-2" y="128" width="132" height="16" fill="#3a2a20"/>
    <rect x="-2" y="316" width="132" height="14" fill="#3a2a20"/>
    <rect x="-2" y="330" width="132" height="4"  fill="#8b5a00" opacity="0.55"/>
    <g stroke="#100a06" stroke-width="0.6" opacity="0.6">
      <line x1="0" y1="185" x2="120" y2="185"/>
      <line x1="0" y1="225" x2="120" y2="225"/>
      <line x1="0" y1="265" x2="120" y2="265"/>
      <line x1="0" y1="300" x2="120" y2="300"/>
    </g>
    <!-- Right column -->
    <rect x="740" y="0" width="120" height="400" fill="url(#column)"/>
    <rect x="730" y="122" width="132" height="5"  fill="#8b5a00" opacity="0.55"/>
    <rect x="730" y="128" width="132" height="16" fill="#3a2a20"/>
    <rect x="730" y="316" width="132" height="14" fill="#3a2a20"/>
    <rect x="730" y="330" width="132" height="4"  fill="#8b5a00" opacity="0.55"/>
    <g stroke="#100a06" stroke-width="0.6" opacity="0.6">
      <line x1="740" y1="185" x2="860" y2="185"/>
      <line x1="740" y1="225" x2="860" y2="225"/>
      <line x1="740" y1="265" x2="860" y2="265"/>
      <line x1="740" y1="300" x2="860" y2="300"/>
    </g>
  </g>

  <!-- === cryptic runes etched into column stones === -->
  <!-- Left column, upper (below torch glow which fades out by ~y=227) -->
  <g transform="translate(35, 245)" stroke="#0a0504" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.82">
    <path d="M 0 0 L 0 9 M 0 2 L 5 0"/>
    <path d="M 12 9 L 15 0 L 18 9 M 13 5 L 17 5"/>
    <path d="M 29 0 L 25 4.5 L 29 9 L 33 4.5 Z"/>
    <path d="M 41 0 L 41 9 M 41 4.5 L 46 0 M 41 4.5 L 46 9"/>
  </g>
  <!-- Left column, lower fragment -->
  <g transform="translate(58, 297)" stroke="#0a0504" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M 0 0 L 0 9 M 0 0 L 4.5 0 M 0 4.5 L 3.5 4.5"/>
    <path d="M 12 0 L 12 9 M 12 2 L 16 0 M 12 6.5 L 16 9"/>
    <path d="M 28 0 L 24 4.5 L 28 9"/>
  </g>
  <!-- Right column, stone below the skeleton's feet -->
  <g transform="translate(770, 302)" stroke="#0a0504" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.82">
    <path d="M 0 0 L 0 9 M 4 0 L 4 9 M 0 0 L 4 0 M 0 9 L 4 9"/>
    <path d="M 12 0 L 12 9 M 12 0 L 16 0 M 16 0 L 16 4 L 12 4"/>
    <path d="M 26 0 L 26 9 M 26 0 L 30 5 L 26 9"/>
    <path d="M 38 0 L 38 9 M 38 4.5 L 42 0 M 38 4.5 L 42 9"/>
  </g>

  <!-- === chained skeleton shackled to the right column === -->
  <g transform="translate(800, 205)">
    <!-- wall anchors -->
    <rect x="-34" y="-62" width="7" height="10" fill="#2a1e14" stroke="#4a3a2a" stroke-width="0.5"/>
    <rect x="27"  y="-62" width="7" height="10" fill="#2a1e14" stroke="#4a3a2a" stroke-width="0.5"/>
    <!-- chains -->
    <g fill="none" stroke="#6a6058" stroke-width="1.1">
      <ellipse cx="-30" cy="-48" rx="2.5" ry="1.6"/>
      <ellipse cx="-29" cy="-41" rx="1.6" ry="2.5"/>
      <ellipse cx="-28" cy="-34" rx="2.5" ry="1.6"/>
      <ellipse cx="-27" cy="-27" rx="1.6" ry="2.5"/>
      <ellipse cx="-26" cy="-20" rx="2.5" ry="1.6"/>
      <ellipse cx="30" cy="-48" rx="2.5" ry="1.6"/>
      <ellipse cx="29" cy="-41" rx="1.6" ry="2.5"/>
      <ellipse cx="28" cy="-34" rx="2.5" ry="1.6"/>
      <ellipse cx="27" cy="-27" rx="1.6" ry="2.5"/>
      <ellipse cx="26" cy="-20" rx="2.5" ry="1.6"/>
    </g>
    <!-- arms -->
    <g fill="none" stroke="#c8b88a" stroke-width="2.2" stroke-linecap="round">
      <path d="M -8 2 L -18 -10 L -25 -18"/>
      <path d="M  8 2 L  18 -10 L  25 -18"/>
    </g>
    <!-- skull -->
    <circle cx="0" cy="-8" r="8.5" fill="#c8b88a" stroke="#2a1a0a" stroke-width="0.6"/>
    <circle cx="-3.2" cy="-9" r="2.1" fill="#0a0504"/>
    <circle cx="3.2"  cy="-9" r="2.1" fill="#0a0504"/>
    <path d="M -0.6 -5.5 L -1.6 -3.2 L 1.6 -3.2 L 0.6 -5.5 Z" fill="#0a0504"/>
    <!-- jaw / teeth -->
    <rect x="-5" y="-1.5" width="10" height="3.6" fill="#c8b88a" stroke="#2a1a0a" stroke-width="0.45"/>
    <g stroke="#2a1a0a" stroke-width="0.5">
      <line x1="-3.6" y1="-0.2" x2="-3.6" y2="1.6"/>
      <line x1="-1.8" y1="-0.2" x2="-1.8" y2="1.6"/>
      <line x1="0"    y1="-0.2" x2="0"    y2="1.6"/>
      <line x1="1.8"  y1="-0.2" x2="1.8"  y2="1.6"/>
      <line x1="3.6"  y1="-0.2" x2="3.6"  y2="1.6"/>
    </g>
    <!-- spine -->
    <line x1="0" y1="3" x2="0" y2="38" stroke="#c8b88a" stroke-width="2" stroke-linecap="round"/>
    <!-- ribs -->
    <g fill="none" stroke="#b0a070" stroke-width="1">
      <path d="M 0 7  Q -9 9  -8 15"/>
      <path d="M 0 7  Q  9 9   8 15"/>
      <path d="M 0 15 Q -10 17 -9 23"/>
      <path d="M 0 15 Q  10 17  9 23"/>
      <path d="M 0 23 Q -8 25 -7 30"/>
      <path d="M 0 23 Q  8 25  7 30"/>
    </g>
    <!-- pelvis -->
    <path d="M -6 37 L 6 37 L 8 46 L -8 46 Z" fill="#c8b88a" stroke="#2a1a0a" stroke-width="0.5"/>
    <!-- legs -->
    <g fill="none" stroke="#c8b88a" stroke-width="2" stroke-linecap="round">
      <path d="M -4 47 L -5 65 L -7 80"/>
      <path d="M  4 47 L  5 65 L  7 80"/>
    </g>
    <!-- feet -->
    <ellipse cx="-9" cy="81" rx="3.2" ry="1.6" fill="#c8b88a"/>
    <ellipse cx="9"  cy="81" rx="3.2" ry="1.6" fill="#c8b88a"/>
    <!-- spider in the ribcage -->
    <g transform="translate(2, 19)"><use href="#spider"/></g>
  </g>

  <!-- === crossbar above the arch === -->
  <path d="M 0 0 L 860 0 L 860 130 L 570 130 A 140 50 0 0 0 290 130 L 0 130 Z" fill="url(#crossbar)"/>
  <path d="M 0 130 L 290 130 A 140 50 0 0 1 570 130 L 860 130" fill="none" stroke="#8b5a00" stroke-width="1.4" opacity="0.75"/>
  <path d="M 0 132 L 290 132 A 142 52 0 0 1 570 132 L 860 132" fill="none" stroke="#c9a227" stroke-width="0.6" opacity="0.35"/>
  <g stroke="#100a06" stroke-width="0.5" opacity="0.45">
    <line x1="0" y1="48" x2="860" y2="48"/>
    <line x1="0" y1="96" x2="860" y2="96"/>
  </g>
  <polygon points="418,75 442,75 450,100 410,100" fill="#4a3320" stroke="#8b5a00" stroke-width="0.8" opacity="0.9"/>

  <!-- === faint gold runes carved into the crossbar stones === -->
  <g transform="translate(140, 112)" stroke="#8b5a00" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M 0 7 L 3 0 L 6 7 M 1.5 3.5 L 4.5 3.5"/>
    <path d="M 12 0 L 12 7 M 12 0 L 16 3.5 M 12 0 L 8 3.5"/>
    <path d="M 22 0 L 22 7 M 22 0 L 25 0 L 26 1.5 L 25 3 L 22 3"/>
    <path d="M 32 0 L 35 7 M 35 0 L 32 7"/>
  </g>
  <g transform="translate(680, 112)" stroke="#8b5a00" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M 0 0 L 0 7 M 0 3.5 L 5 3.5 M 5 0 L 5 7"/>
    <path d="M 12 7 L 15 0 L 18 7"/>
    <path d="M 24 0 L 24 7 M 24 0 L 28 0 L 28 7"/>
    <path d="M 34 0 L 34 7 M 34 0 L 38 0 M 34 3.5 L 37 3.5 M 34 7 L 38 7"/>
  </g>

  <!-- === floor band & inscribed base === -->
  <rect x="0" y="320" width="860" height="80" fill="#130a07"/>
  <line x1="0" y1="320" x2="860" y2="320" stroke="#3a2a20" stroke-width="1.2"/>
  <line x1="0" y1="322.5" x2="860" y2="322.5" stroke="#8b5a00" stroke-width="0.7" opacity="0.6"/>

  <!-- === gold double frame (inset) === -->
  <rect x="10" y="10" width="840" height="380" fill="none" stroke="#c9a227" stroke-width="1.2" opacity="0.75"/>
  <rect x="14" y="14" width="832" height="372" fill="none" stroke="#8b5a00" stroke-width="0.8" opacity="0.55"/>

  <!-- === corner cobwebs on top of the frame === -->
  <use href="#cobweb" transform="translate(16, 16)"/>
  <use href="#cobweb" transform="translate(844, 16) scale(-1, 1)"/>
  <use href="#cobweb" transform="translate(16, 384) scale(1, -1)"/>
  <use href="#cobweb" transform="translate(844, 384) scale(-1, -1)"/>

  <!-- spider scuttling on the top-left cobweb -->
  <g transform="translate(34, 30)"><use href="#spider"/></g>

  <!-- === torch mounted on the left column === -->
  <g transform="translate(60, 175)">
    <circle cx="0" cy="-6" r="58" fill="url(#torchGlow)"/>
    <rect x="-3" y="0"  width="6"  height="28" fill="#20140a"/>
    <rect x="-9" y="24" width="18" height="5"  fill="#3a2a20"/>
    <ellipse cx="0" cy="-6"  rx="10"  ry="18" fill="url(#flame)"/>
    <ellipse cx="0" cy="-12" rx="4.5" ry="10" fill="#fff2c8" opacity="0.85"/>
  </g>

  <!-- === title typography on the crossbar === -->
  <text x="430" y="36" text-anchor="middle"
        font-family="'Cinzel', Georgia, serif" font-weight="700" font-size="13"
        fill="#c9a227" letter-spacing="0.52em">COMP 2450</text>

  <text x="430" y="70" text-anchor="middle"
        font-family="'Cinzel', Georgia, serif" font-weight="700" font-size="22"
        fill="#e8d8b0" letter-spacing="0.14em"
        style="text-shadow: 0 0 12px rgba(139,15,15,0.6);">DATA STRUCTURES &amp; ALGORITHMS</text>

  <g opacity="0.72">
    <line x1="200" y1="95" x2="410" y2="95" stroke="#c9a227" stroke-width="1"/>
    <polygon points="430,89 440,95 430,101 420,95" fill="#c9a227"/>
    <line x1="450" y1="95" x2="660" y2="95" stroke="#c9a227" stroke-width="1"/>
  </g>

  <text x="430" y="372" text-anchor="middle"
        font-family="'UnifrakturMaguntia', 'Cinzel', Georgia, serif" font-size="34"
        fill="#c9a227" letter-spacing="0.02em">The Descent</text>

  <g fill="#c9a227" opacity="0.55">
    <polygon points="200,366 218,371 200,376 192,371"/>
    <polygon points="660,366 642,371 660,376 668,371"/>
  </g>
</svg>

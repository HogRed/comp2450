<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-labelledby="qpv-title qpv-desc">
  <title id="qpv-title">Quicksort pivot choice: balanced vs skewed recursion</title>
  <desc id="qpv-desc">A well-chosen pivot splits the data roughly in half, producing a balanced recursion tree of depth log n and total work O(n log n). A bad pivot, such as always picking the first element on already-sorted input, produces a skewed tree of depth n and total work O(n squared).</desc>
  <style>
    .node-good { fill: #eacf85; stroke: #8b5a00; stroke-width: 1.5; }
    .node-bad  { fill: #8b0000; stroke: #3a0b0b; stroke-width: 1.5; }
    .n-good { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #2a1a0a; text-anchor: middle; dominant-baseline: central; font-weight: 700; }
    .n-bad  { font-family: Consolas, 'Courier New', monospace; font-size: 13px; fill: #f2e4bc; text-anchor: middle; dominant-baseline: central; font-weight: 700; }
    .edge-good { stroke: #8b5a00; stroke-width: 1.2; opacity: 0.7; fill: none; }
    .edge-bad  { stroke: #6b0f0f; stroke-width: 1.3; opacity: 0.8; fill: none; }
    .header { font-family: Georgia, serif; font-size: 12.5px; fill: #6b0f0f; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; text-anchor: middle; }
    .footer { font-family: Georgia, serif; font-size: 11px; fill: #4a3a2a; font-style: italic; text-anchor: middle; }
    .big-o-good { font-family: Georgia, serif; font-size: 13px; fill: #8b5a00; font-weight: 700; text-anchor: middle; letter-spacing: 0.04em; }
    .big-o-bad  { font-family: Georgia, serif; font-size: 13px; fill: #8b0000; font-weight: 700; text-anchor: middle; letter-spacing: 0.04em; }
    .note { font-family: Georgia, serif; font-size: 11px; fill: #6b0f0f; text-anchor: middle; font-style: italic; }
  </style>

  <text class="header" x="130" y="22">Good pivot · balanced</text>
  <text class="header" x="390" y="22">Bad pivot on sorted input</text>

  <line x1="260" y1="35" x2="260" y2="310" stroke="#8b5a00" stroke-width="0.6" opacity="0.4" stroke-dasharray="3,3"/>

  <!-- Balanced tree: root 8 -> (3,4) -> (1,1 | 1,2) -> (1,0 under the 2) -->
  <line class="edge-good" x1="130" y1="55"  x2="85"  y2="115"/>
  <line class="edge-good" x1="130" y1="55"  x2="175" y2="115"/>
  <line class="edge-good" x1="85"  y1="115" x2="60"  y2="175"/>
  <line class="edge-good" x1="85"  y1="115" x2="110" y2="175"/>
  <line class="edge-good" x1="175" y1="115" x2="150" y2="175"/>
  <line class="edge-good" x1="175" y1="115" x2="200" y2="175"/>
  <line class="edge-good" x1="200" y1="175" x2="185" y2="225"/>
  <line class="edge-good" x1="200" y1="175" x2="215" y2="225"/>

  <circle class="node-good" cx="130" cy="55"  r="14"/><text class="n-good" x="130" y="55">8</text>
  <circle class="node-good" cx="85"  cy="115" r="13"/><text class="n-good" x="85"  y="115">3</text>
  <circle class="node-good" cx="175" cy="115" r="13"/><text class="n-good" x="175" y="115">4</text>
  <circle class="node-good" cx="60"  cy="175" r="12"/><text class="n-good" x="60"  y="175">1</text>
  <circle class="node-good" cx="110" cy="175" r="12"/><text class="n-good" x="110" y="175">1</text>
  <circle class="node-good" cx="150" cy="175" r="12"/><text class="n-good" x="150" y="175">1</text>
  <circle class="node-good" cx="200" cy="175" r="12"/><text class="n-good" x="200" y="175">2</text>
  <circle class="node-good" cx="185" cy="225" r="11"/><text class="n-good" x="185" y="225">1</text>
  <circle class="node-good" cx="215" cy="225" r="11"/><text class="n-good" x="215" y="225">0</text>

  <text class="footer"     x="130" y="278">depth ≈ log₂ n</text>
  <text class="big-o-good" x="130" y="298">O(n log n)</text>

  <!-- Skewed tree: each level has only one non-trivial child -->
  <line class="edge-bad" x1="305" y1="55"  x2="330" y2="97"/>
  <line class="edge-bad" x1="330" y1="97"  x2="355" y2="139"/>
  <line class="edge-bad" x1="355" y1="139" x2="380" y2="181"/>
  <line class="edge-bad" x1="380" y1="181" x2="405" y2="223"/>
  <line class="edge-bad" x1="405" y1="223" x2="430" y2="265"/>

  <circle class="node-bad" cx="305" cy="55"  r="14"/><text class="n-bad" x="305" y="55">8</text>
  <circle class="node-bad" cx="330" cy="97"  r="13"/><text class="n-bad" x="330" y="97">7</text>
  <circle class="node-bad" cx="355" cy="139" r="13"/><text class="n-bad" x="355" y="139">6</text>
  <circle class="node-bad" cx="380" cy="181" r="12"/><text class="n-bad" x="380" y="181">5</text>
  <circle class="node-bad" cx="405" cy="223" r="12"/><text class="n-bad" x="405" y="223">4</text>
  <circle class="node-bad" cx="430" cy="265" r="11"/><text class="n-bad" x="430" y="265">3</text>

  <text class="note" x="460" y="293">⋱ and 2 more</text>

  <text class="footer"    x="390" y="320">depth = n</text>
  <text class="big-o-bad" x="390" y="340">O(n²)</text>
</svg>

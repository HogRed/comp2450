  <path class="hood-shadow" d="M 74 70 Q 80 60, 110 60 Q 140 60, 146 70 Q 148 90, 142 100 L 138 100 L 134 96 L 86 96 L 82 100 L 78 100 Q 72 90, 74 70 Z"/>

  <path class="brow" d="M 86 100 Q 94 97, 102 100"/>
  <path class="brow" d="M 118 100 Q 126 97, 134 100"/>

  <ellipse class="eye-white" cx="94" cy="108" rx="3.5" ry="1.8"/>
  <ellipse class="eye-white" cx="126" cy="108" rx="3.5" ry="1.8"/>
  <circle class="eye-iris" cx="94" cy="108" r="1.4"/>
  <circle class="eye-iris" cx="126" cy="108" r="1.4"/>
  <circle class="eye-pupil" cx="94" cy="108" r="0.7"/>
  <circle class="eye-pupil" cx="126" cy="108" r="0.7"/>

  <path class="nose" d="M 110 114 L 107 128 Q 110 132, 114 128"/>

  <ellipse class="mouth-open" cx="110" cy="142" rx="3.5" ry="3.2"/>
  <path class="lip" d="M 105 140 Q 110 138, 115 140"/>
  <path class="lip" d="M 105 145 Q 110 147, 115 145"/>

  <rect class="nameplate" x="22" y="234" width="176" height="32" rx="2"/>
  <text class="name" x="110" y="251">The Nameless Bard</text>
  <text class="title" x="110" y="262">Singer of the Descent</text>

  <circle class="stud" cx="14" cy="14" r="2.5"/>
  <circle class="stud" cx="206" cy="14" r="2.5"/>
  <circle class="stud" cx="14" cy="266" r="2.5"/>
  <circle class="stud" cx="206" cy="266" r="2.5"/>
</svg>

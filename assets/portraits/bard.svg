<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" role="img" aria-labelledby="bard-title bard-desc">
  <title id="bard-title">The Nameless Bard</title>
  <desc id="bard-desc">A bust portrait. A hooded singer in a deep purple cloak, his face half-shadowed by the drawn-forward hood, parted lips mid-song, dark hair escaping at the brow, against a midnight-purple field scattered with small pale stars. A nameplate at the foot reads THE NAMELESS BARD — Singer of the Descent.</desc>
  <defs>
    <pattern id="bard-stipple" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="#1a0e2a"/>
      <circle cx="4" cy="6" r="0.6" fill="#f8eed0" opacity="0.7"/>
      <circle cx="16" cy="12" r="0.4" fill="#f8eed0" opacity="0.6"/>
      <circle cx="9" cy="17" r="0.5" fill="#f8eed0" opacity="0.5"/>
      <circle cx="19" cy="3" r="0.3" fill="#f8eed0" opacity="0.8"/>
      <circle cx="2" cy="19" r="0.3" fill="#f8eed0" opacity="0.6"/>
      <path d="M 12 8 L 12.5 7 L 13 8 L 12 8 Z" fill="#c89860" opacity="0.5"/>
    </pattern>
  </defs>
  <style>
    .frame-outer    { fill: #8b5a00; stroke: #3a2406; stroke-width: 1.6; }
    .frame-mid      { fill: #c89860; stroke: #6b3018; stroke-width: 0.8; }
    .frame-mat      { fill: #f2e4bc; stroke: #6b3018; stroke-width: 1.0; }
    .bg-field       { fill: url(#bard-stipple); stroke: #08041a; stroke-width: 1.0; }
    .cloak          { fill: #2e1a4a; stroke: #100628; stroke-width: 1.2; }
    .cloak-trim     { stroke: #6b3018; stroke-width: 1.2; fill: none; }
    .hood           { fill: #1c0e2e; stroke: #08041a; stroke-width: 1.2; }
    .hood-shadow    { fill: #08041a; opacity: 0.55; }
    .clasp          { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
    .skin           { fill: #d8b088; stroke: #6a4020; stroke-width: 0.9; }
    .skin-shadow    { fill: #1c0e2e; opacity: 0.45; }
    .hair           { fill: #1a0e08; stroke: #08040a; stroke-width: 0.8; }
    .brow           { stroke: #08040a; stroke-width: 1.4; fill: none; stroke-linecap: round; }
    .eye-white      { fill: #d8c8a8; stroke: #1a0e08; stroke-width: 0.4; }
    .eye-iris       { fill: #2a1838; }
    .eye-pupil      { fill: #08040a; }
    .nose           { stroke: #6a4020; stroke-width: 0.8; fill: none; stroke-linecap: round; }
    .mouth-open     { fill: #2a0810; stroke: #5a1810; stroke-width: 0.8; }
    .lip            { stroke: #6a2018; stroke-width: 0.7; fill: none; stroke-linecap: round; }
    .note           { fill: #f8eed0; stroke: #6b3018; stroke-width: 0.6; }
    .nameplate      { fill: #f6efd5; stroke: #6b3018; stroke-width: 1.0; }
    .name           { font-family: Georgia, serif; font-size: 13px; fill: #6b0f0f; font-weight: 700; text-anchor: middle; letter-spacing: 0.04em; text-transform: uppercase; }
    .title          { font-family: Georgia, serif; font-size: 9px; fill: #4a3a2a; font-style: italic; text-anchor: middle; letter-spacing: 0.05em; }
    .stud           { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
  </style>

  <rect class="frame-outer" x="2"  y="2"  width="216" height="276" rx="6"/>
  <rect class="frame-mid"   x="6"  y="6"  width="208" height="268" rx="4"/>
  <rect class="frame-mat"   x="10" y="10" width="200" height="260" rx="3"/>
  <rect class="bg-field"    x="18" y="18" width="184" height="210" rx="2"/>


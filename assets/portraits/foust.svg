<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" role="img" aria-labelledby="foust-title foust-desc">
  <title id="foust-title">Foust of the Margin-Road, Merchant and Cartographer</title>
  <desc id="foust-desc">A bust portrait. A merchant with auburn red hair, a neatly trimmed red beard, and a knowing half-smile, wearing a forest-green tunic with brass buttons under a leather satchel strap that crosses his chest, with a brass coin on a cord at his throat, against a parchment field crossed by faint map lines. A nameplate at the foot reads FOUST OF THE MARGIN-ROAD — Merchant and Cartographer.</desc>
  <defs>
    <pattern id="foust-stipple" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#eacf85"/>
      <path d="M 0 8 Q 10 4, 20 8 T 40 8" stroke="#8b5a00" stroke-width="0.4" fill="none" opacity="0.5"/>
      <path d="M 0 28 Q 12 24, 24 30 T 40 28" stroke="#8b5a00" stroke-width="0.4" fill="none" opacity="0.5"/>
      <circle cx="6" cy="20" r="0.7" fill="#8b5a00" opacity="0.6"/>
      <circle cx="32" cy="14" r="0.6" fill="#8b5a00" opacity="0.5"/>
      <path d="M 30 30 L 32 34 L 34 30 L 32 32 Z" fill="#8b5a00" opacity="0.4"/>
    </pattern>
  </defs>
  <style>
    .frame-outer    { fill: #8b5a00; stroke: #3a2406; stroke-width: 1.6; }
    .frame-mid      { fill: #c89860; stroke: #6b3018; stroke-width: 0.8; }
    .frame-mat      { fill: #f2e4bc; stroke: #6b3018; stroke-width: 1.0; }
    .bg-field       { fill: url(#foust-stipple); stroke: #6b4818; stroke-width: 1.0; }
    .tunic          { fill: #2c5a30; stroke: #0e2810; stroke-width: 1.2; }
    .tunic-button   { fill: #c89860; stroke: #5e3c00; stroke-width: 0.5; }
    .strap          { fill: #6b3018; stroke: #2a1004; stroke-width: 0.8; }
    .coin           { fill: #f0c060; stroke: #5e3c00; stroke-width: 0.7; }
    .cord           { stroke: #2a1004; stroke-width: 0.8; fill: none; stroke-linecap: round; }
    .skin           { fill: #ecc090; stroke: #8b5028; stroke-width: 0.9; }
    .skin-shadow    { fill: #b88860; opacity: 0.28; }
    .hair           { fill: #a04020; stroke: #4a1808; stroke-width: 0.9; }
    .hair-hi        { fill: #d06030; opacity: 0.55; }
    .beard          { fill: #a04020; stroke: #4a1808; stroke-width: 0.9; }
    .beard-hi       { fill: #d06030; opacity: 0.45; }
    .brow           { stroke: #4a1808; stroke-width: 1.6; fill: none; stroke-linecap: round; }
    .eye-white      { fill: #f8eed0; stroke: #3a1808; stroke-width: 0.5; }
    .eye-iris       { fill: #3a5028; }
    .eye-pupil      { fill: #100804; }
    .nose           { stroke: #8b5028; stroke-width: 0.9; fill: none; stroke-linecap: round; }
    .mouth          { stroke: #5a1810; stroke-width: 1.0; fill: none; stroke-linecap: round; }
    .nameplate      { fill: #f6efd5; stroke: #6b3018; stroke-width: 1.0; }
    .name           { font-family: Georgia, serif; font-size: 13px; fill: #6b0f0f; font-weight: 700; text-anchor: middle; letter-spacing: 0.06em; text-transform: uppercase; }
    .title          { font-family: Georgia, serif; font-size: 9px; fill: #4a3a2a; font-style: italic; text-anchor: middle; letter-spacing: 0.05em; }
    .stud           { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
  </style>


<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" role="img" aria-labelledby="steil-title steil-desc">
  <title id="steil-title">Forgemaster Steil, Master of the Cold Forge</title>
  <desc id="steil-desc">A bust portrait. A blacksmith with long brown hair streaked with gray and a heavy gray-flecked beard, wearing a dark leather apron with a brass anvil pin over a rust-red tunic, against a smoke-and-ember field. A nameplate at the foot reads FORGEMASTER STEIL — Master of the Cold Forge.</desc>
  <defs>
    <pattern id="steil-stipple" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#241a14"/>
      <circle cx="3" cy="3" r="0.8" fill="#d8742a" opacity="0.5"/>
      <circle cx="10" cy="11" r="0.6" fill="#d8742a" opacity="0.4"/>
      <circle cx="11" cy="4" r="0.4" fill="#f4a040" opacity="0.6"/>
    </pattern>
  </defs>
  <style>
    .frame-outer    { fill: #8b5a00; stroke: #3a2406; stroke-width: 1.6; }
    .frame-mid      { fill: #c89860; stroke: #6b3018; stroke-width: 0.8; }
    .frame-mat      { fill: #f2e4bc; stroke: #6b3018; stroke-width: 1.0; }
    .bg-field       { fill: url(#steil-stipple); stroke: #1a0e04; stroke-width: 1.0; }
    .tunic          { fill: #6e2e18; stroke: #2a0c04; stroke-width: 1.0; }
    .tunic-trim     { stroke: #a05028; stroke-width: 1.5; fill: none; }
    .apron          { fill: #3a2410; stroke: #1a0e04; stroke-width: 1.2; }
    .anvil          { fill: #c89860; stroke: #5e3c00; stroke-width: 0.5; }
    .skin           { fill: #d8a878; stroke: #6a4020; stroke-width: 0.9; }
    .skin-shadow    { fill: #a07050; opacity: 0.35; }
    .hair           { fill: #3a2818; stroke: #1a0e04; stroke-width: 0.9; }
    .hair-gray      { fill: #8a7a6a; opacity: 0.6; }
    .beard          { fill: #4a3220; stroke: #1a0e04; stroke-width: 0.9; }
    .beard-gray     { fill: #8a7a6a; opacity: 0.5; }
    .brow           { stroke: #1a0e04; stroke-width: 1.8; fill: none; stroke-linecap: round; }
    .eye-white      { fill: #f8eed0; stroke: #3a1808; stroke-width: 0.5; }
    .eye-iris       { fill: #2a3a4a; }
    .eye-pupil      { fill: #100804; }
    .nose           { stroke: #6a4020; stroke-width: 0.9; fill: none; stroke-linecap: round; }
    .mouth          { stroke: #5a1810; stroke-width: 0.9; fill: none; stroke-linecap: round; }
    .nameplate      { fill: #f6efd5; stroke: #6b3018; stroke-width: 1.0; }
    .name           { font-family: Georgia, serif; font-size: 13px; fill: #6b0f0f; font-weight: 700; text-anchor: middle; letter-spacing: 0.08em; text-transform: uppercase; }
    .title          { font-family: Georgia, serif; font-size: 9px; fill: #4a3a2a; font-style: italic; text-anchor: middle; letter-spacing: 0.05em; }
    .stud           { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
  </style>


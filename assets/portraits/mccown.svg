<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" role="img" aria-labelledby="mccown-title mccown-desc">
  <title id="mccown-title">Scrivener McCown, Keeper of the Bestiary</title>
  <desc id="mccown-desc">A bust portrait. A scholar with dark brown hair graying at the temples, neat salt-and-pepper beard, and a thoughtful gaze, wearing a dark indigo robe with a high collar fastened by a brass clasp and a small quill-and-ledger pendant at his chest, against a parchment field flecked with ink. A nameplate at the foot reads SCRIVENER MCCOWN — Keeper of the Bestiary.</desc>
  <defs>
    <pattern id="mccown-stipple" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#e8d8a8"/>
      <circle cx="3" cy="4" r="0.5" fill="#3a2818" opacity="0.45"/>
      <circle cx="11" cy="9" r="0.6" fill="#3a2818" opacity="0.4"/>
      <circle cx="7" cy="13" r="0.4" fill="#3a2818" opacity="0.5"/>
      <circle cx="13" cy="3" r="0.3" fill="#3a2818" opacity="0.6"/>
    </pattern>
  </defs>
  <style>
    .frame-outer    { fill: #8b5a00; stroke: #3a2406; stroke-width: 1.6; }
    .frame-mid      { fill: #c89860; stroke: #6b3018; stroke-width: 0.8; }
    .frame-mat      { fill: #f2e4bc; stroke: #6b3018; stroke-width: 1.0; }
    .bg-field       { fill: url(#mccown-stipple); stroke: #3a2818; stroke-width: 1.0; }
    .robe           { fill: #1c2848; stroke: #08101e; stroke-width: 1.2; }
    .robe-collar    { fill: #2a3a5e; stroke: #08101e; stroke-width: 1.0; }
    .clasp          { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
    .ledger         { fill: #6b3018; stroke: #2a1004; stroke-width: 0.6; }
    .ledger-page    { fill: #f6efd5; stroke: #6b3018; stroke-width: 0.4; }
    .quill          { fill: #f8eed0; stroke: #3a2818; stroke-width: 0.4; }
    .skin           { fill: #e0b88c; stroke: #7a4828; stroke-width: 0.9; }
    .skin-shadow    { fill: #a87858; opacity: 0.30; }
    .hair           { fill: #2a1c10; stroke: #100804; stroke-width: 0.9; }
    .hair-gray      { fill: #8a7a6a; opacity: 0.65; }
    .beard          { fill: #3a2818; stroke: #100804; stroke-width: 0.9; }
    .beard-gray     { fill: #8a7a6a; opacity: 0.55; }
    .brow           { stroke: #100804; stroke-width: 1.6; fill: none; stroke-linecap: round; }
    .eye-white      { fill: #f8eed0; stroke: #3a1808; stroke-width: 0.5; }
    .eye-iris       { fill: #3a2810; }
    .eye-pupil      { fill: #100804; }
    .nose           { stroke: #7a4828; stroke-width: 0.9; fill: none; stroke-linecap: round; }
    .mouth          { stroke: #5a1810; stroke-width: 0.9; fill: none; stroke-linecap: round; }
    .nameplate      { fill: #f6efd5; stroke: #6b3018; stroke-width: 1.0; }
    .name           { font-family: Georgia, serif; font-size: 13px; fill: #6b0f0f; font-weight: 700; text-anchor: middle; letter-spacing: 0.08em; text-transform: uppercase; }
    .title          { font-family: Georgia, serif; font-size: 9px; fill: #4a3a2a; font-style: italic; text-anchor: middle; letter-spacing: 0.05em; }
    .stud           { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
  </style>


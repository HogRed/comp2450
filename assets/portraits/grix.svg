<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" role="img" aria-labelledby="grix-title grix-desc">
  <title id="grix-title">Grix the Opportunist, Goblin of the Eleventh Sack</title>
  <desc id="grix-desc">A bust portrait. A goblin with sallow green skin, oversized pointed ears, a knobby crooked nose, wide yellow eyes, and an enormous gap-toothed grin showing one buck tooth, wearing a patched mismatched tunic and a leather collar with a stolen brass key dangling, against a damp cave-grey field with mossy flecks. A nameplate at the foot reads GRIX THE OPPORTUNIST — Goblin of the Eleventh Sack.</desc>
  <defs>
    <pattern id="grix-stipple" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#3a3a32"/>
      <circle cx="3" cy="4" r="0.8" fill="#5a6a3a" opacity="0.55"/>
      <circle cx="10" cy="10" r="0.7" fill="#4a5a2a" opacity="0.6"/>
      <circle cx="11" cy="3" r="0.4" fill="#2a2a22" opacity="0.7"/>
      <circle cx="4" cy="11" r="0.4" fill="#2a2a22" opacity="0.7"/>
    </pattern>
  </defs>
  <style>
    .frame-outer    { fill: #8b5a00; stroke: #3a2406; stroke-width: 1.6; }
    .frame-mid      { fill: #c89860; stroke: #6b3018; stroke-width: 0.8; }
    .frame-mat      { fill: #f2e4bc; stroke: #6b3018; stroke-width: 1.0; }
    .bg-field       { fill: url(#grix-stipple); stroke: #1a1a14; stroke-width: 1.0; }
    .tunic-a        { fill: #6a4818; stroke: #2a1a08; stroke-width: 1.0; }
    .tunic-b        { fill: #4a3a5a; stroke: #1a1228; stroke-width: 1.0; }
    .patch          { fill: #8a6a3a; stroke: #2a1a08; stroke-width: 0.6; stroke-dasharray: 1.5 1.0; }
    .collar         { fill: #2a1a08; stroke: #100804; stroke-width: 0.8; }
    .key            { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
    .skin           { fill: #7a9050; stroke: #2a3a18; stroke-width: 0.9; }
    .skin-shadow    { fill: #4a6028; opacity: 0.40; }
    .skin-hi        { fill: #98ac68; opacity: 0.45; }
    .ear-inner      { fill: #4a6028; opacity: 0.5; }
    .hair-tuft      { fill: #1a0e08; stroke: #08040a; stroke-width: 0.7; }
    .brow           { stroke: #1a0e08; stroke-width: 2.2; fill: none; stroke-linecap: round; }
    .eye-white      { fill: #f8e060; stroke: #3a1808; stroke-width: 0.5; }
    .eye-iris       { fill: #b8800a; }
    .eye-pupil      { fill: #100804; }
    .nose           { fill: #98ac68; stroke: #2a3a18; stroke-width: 0.8; }
    .nose-shadow    { fill: #4a6028; opacity: 0.4; }
    .mouth-open     { fill: #2a0810; stroke: #2a1a08; stroke-width: 0.9; }
    .tooth          { fill: #f0e0a8; stroke: #5a4818; stroke-width: 0.4; }
    .nameplate      { fill: #f6efd5; stroke: #6b3018; stroke-width: 1.0; }
    .name           { font-family: Georgia, serif; font-size: 12px; fill: #6b0f0f; font-weight: 700; text-anchor: middle; letter-spacing: 0.02em; text-transform: uppercase; }
    .title          { font-family: Georgia, serif; font-size: 9px; fill: #4a3a2a; font-style: italic; text-anchor: middle; letter-spacing: 0.03em; }
    .stud           { fill: #c89860; stroke: #5e3c00; stroke-width: 0.6; }
  </style>


---
layout: default
---
<article class="floor">
  <div class="floor-banner">
    <div class="floor-number">{{ page.floor_number }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.flavor_quote %}
    <div class="bard-quote">
      <img class="bard-icon" src="{{ '/assets/portraits/bard.svg' | relative_url }}" alt="The Nameless Bard sings the floor's epigraph"/>
      <p class="flavor-quote">{{ page.flavor_quote }}</p>
    </div>
    {% endif %}
  </div>
  {{ content }}
</article>
